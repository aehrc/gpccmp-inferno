        - linkId: patient-instructions
          text: This form has been prefilled with information that was available from
            the patient's health record. Upon saving, the form will be stored, but
            additional information entered will not be used to update the patient's
            health record. Changes to patient demographic information should be made
            in the source system.
          _text:
            extension:
            - url: http://hl7.org/fhir/StructureDefinition/rendering-xhtml
              valueString: |-
                <div xmlns="http://www.w3.org/1999/xhtml">
                    <p><em>This form has been prefilled with information that was available from the patient's health record. Upon saving, the form will be stored, but additional information entered will not be used to update the patient's health record. Changes to patient demographic information should be made in the source system.</em></p></div>
          type: display
        - linkId: patient-consent
          text: Consent
          type: group
          repeats: false
          item:
          - linkId: patient-consent-consentforplan
