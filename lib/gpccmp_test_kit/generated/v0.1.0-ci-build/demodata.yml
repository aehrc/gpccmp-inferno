              benefits, process and costs
            type: boolean
            repeats: false
        - extension:
          - url: http://hl7.org/fhir/uv/sdc/StructureDefinition/sdc-questionnaire-initialExpression
            valueExpression:
              language: text/fhirpath
              expression: "(%patient.name.where(use='official').select((given.join('
                ') | family).join(' ') | text) | %patient.name.select((given.join('
                ') | family).join(' ') | text)).first()"
          linkId: patient-name
          text: Name
          type: string
          repeats: false
          readOnly: true
        - extension:
          - url: http://hl7.org/fhir/uv/sdc/StructureDefinition/sdc-questionnaire-initialExpression
            valueExpression:
              language: text/fhirpath
              expression: "(%patient.name.where(use='usual').select((given.join('
